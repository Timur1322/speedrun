<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <h2>Вход</h2>
    <form method="post">
        {% csrf_token %}
        <p>Логин:</p>
        <input type="text" name="username">
        <p>Пароль:</p>
        <input type="password" name="password">
        <br><br>
        <button type="submit">Войти</button>
    </form>
    <p>{{ msg }}</p>
</body>
</html>
